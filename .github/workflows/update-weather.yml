name: Update Weather

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DuckDB
        run: python3 -m pip install duckdb

      - name: Prepare local DuckDB copy
        run: |
          mkdir -p .local.nosync
          cp analytics.duckdb .local.nosync/analytics.duckdb

      - name: Update weather data
        run: python3 Python/update_weather.py

      - name: Generate forecast similarity
        run: python3 analytics/generate_forecast_similarity.py

      - name: Commit generated data if changed
        run: |
          if git diff --quiet -- data/weather.json data/today_forecast.json data/forecast_similarity.json; then
            echo "No generated data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather.json data/today_forecast.json data/forecast_similarity.json
          git commit -m "Update weather forecast data"
          git push
